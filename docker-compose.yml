services:
  monitor:
    build: .
    image: rk3566-monitor-copilot
    container_name: rk3566-monitor-copilot
    privileged: true
    networks:
      - proxy
    ports:
      - "5000:5000"
    #env_file:
      #- .env
    environment:
      # Path for the local CSV log file that records graph values.
      # When running via Docker Compose the recommended path is /data/metrics_log.csv
      # so that the file is written to the mounted ./data volume.
      - METRICS_LOG_FILE=/data/metrics_log.csv
      - HOST=0.0.0.0
      - PORT=5000
      - SECRET_KEY=change-me-in-production
      - FLASK_ENV=production
      - LOG_LEVEL=INFO
      # How often (in seconds) metrics are collected and broadcast to clients.
      - POLL_INTERVAL_SECONDS=5 
      # How many days of data to retain in the local CSV log (older rows are pruned).
      - RETENTION_DAYS=14
      # After this many hours, high-frequency rows in the CSV log are resampled
      # (averaged) into 1-minute buckets to reduce file size.
      - RESAMPLE_AFTER_HOURS=48
      #- NPU_LOAD_PATH=/sys/kernel/debug/rknpu/load
      #- DISK2_MOUNTPOINT=/dev/zram1
    volumes:
      - /proc:/proc:ro
      - /sys:/sys:ro
      - /etc/hostname:/etc/hostname:ro
      - /mnt/DOCKER/volumes/rk3566-monitor-copilot/data:/data
    restart: unless-stopped

############

networks:
  proxy:
    external: true
