services:
  monitor:
    build: .
    image: rk3566-monitor-copilot
    container_name: rk3566-monitor-copilot
    privileged: true
    networks:
      - proxy
    ports:
      - "5000:5000"
    env_file:
      - .env
    # Grant read access to host /proc and /sys for real hardware metrics
    volumes:
      - /proc:/proc:ro
      - /sys:/sys:ro
    restart: unless-stopped

############

networks:
  proxy:
    external: true
