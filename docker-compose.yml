version: '3.8'

services:
  monitor:
    build: .
    image: rk3566-monitor
    container_name: rk3566-monitor
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    # Grant read access to host /proc and /sys for real hardware metrics
    volumes:
      - /proc:/proc:ro
      - /sys:/sys:ro
    network_mode: host
